services:
  - type: web
    name: anthropic-proxy
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_URL
        value: https://api.anthropic.com
    healthCheckPath: /health
